name: Playwright API tests

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/api-tests.yml"
      - "infra/**"
      - "package-lock.json"
      - "package.json"
      - "playwright.config.ts"
      - "src/**"
      - "tests/**"
      - "tsconfig.json"
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/api-tests.yml"
      - "infra/**"
      - "package-lock.json"
      - "package.json"
      - "playwright.config.ts"
      - "src/**"
      - "tests/**"
      - "tsconfig.json"
  workflow_dispatch:

jobs:
  api-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      API_BASE_URL: http://localhost:4111
      API_VERSION: /api/v1
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: admin
      CI: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Start backend
        run: npm run docker:up

      - name: Validate Docker Compose config
        run: docker compose -f infra/docker_compose/docker-compose.yml config --quiet

      - name: Run typecheck
        run: npm run typecheck

      - name: Run API tests
        run: npm run test:api

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 7

      - name: Stop backend
        if: always()
        run: npm run docker:down
